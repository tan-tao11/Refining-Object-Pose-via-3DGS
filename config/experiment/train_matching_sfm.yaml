exp_name: train_match
task_name: onepose_train_match

model:
  ckpt: null

  profiler: null

  backbone:
    type: ResNetFPN
    resolution: [8, 2]
    resnetfpn:
      block_type: "BasicBlock"
      initial_dim: 128
      block_dims: [128, 196, 256]
      output_layers: [3, 1]
    pretrained: "weight/LoFTR_wsize9.ckpt"
    pretrained_fix: False
  
  keypoints_encoding:
      enable: True
      type: mlp_linear
      descriptor_dim: 256
      keypoints_encoder: [32, 64, 128]
      norm_method: "instancenorm"

  positional_encoding:
    enable: True
    pos_emb_shape: [256, 256]

  coarse_matching:
      type: "dual-softmax" #"sigmoid" # "dual-softmax"
      thr: 0.1
      feat_norm_method: "sqrt_feat_dim"
      border_rm: 2

      dual_softmax:
        temperature: 0.08

      sigmoid:
        temperature: 0.08

      train:
        train_padding: True # Good to be true
        train_coarse_percent: 0.3 # save GPU memory
        train_pad_num_gt_min: 200 # avoid deadlock; better convergence

  loftr_coarse:
    type: "LoFTR"
    d_model: 256
    d_ffm: 128
    nhead: 8
    layer_names: ["self", "cross"]
    layer_iter_n: 3
    dropout: 0.
    attention: "linear"
    norm_method: "layernorm"

    kernel_fn: "elu + 1"
    d_kernel: 16
    redraw_interval: 2
    rezero: null
    final_proj: False

  loftr_fine:
    enable: True
    # Fine preprocess:
    window_size: 5
    coarse_layer_norm: False

    # Fine module
    type: "LoFTR"
    d_model: 128
    nhead: 8
    layer_names: ["self", "cross"]
    layer_iter_n: 1
    dropout: 0.0
    attention: "linear"
    norm_method: layernorm

    kernel_fn: "elu + 1"
    d_kernel: 16
    redraw_interval: 2
    rezero: null
    final_proj: False

  fine_matching:
        enable: True
        type: 's2d'

        s2d:
            type: 'heatmap'

  match_type: "softmax" #"sigmoid" #"softmax"

dataset:
  data_root: dataset/OnePose
  anno_dirs: outputs_${model.match_type}/anno
  train_anno_file: ${merge_output_dir}/${task_name}/train.json
  val_anno_file: ${merge_output_dir}/${task_name}/val.json
  augmentor_method: null

  train_percent: 1.0
  val_percent: 0.4

  # 3D part
  load_3d_coarse: True
  shape3d_train: 7000
  shape3d_val: 7000
  train_image_warp_adapt: True

  # 2D part
  img_pad: False
  img_resize: [512, 512]
  df: 8
  coarse_scale: 0.125

  match_type: ${model.match_type}

train:
  enable_plotting: True
  batch_size: 2
  data_workers: 4
  learning_rate: 1e-4
  step_size: 10000
  gamma: 0.5
  max_epochs: 10
  save_dir: output/${exp_name}
  save_itr: 10000
  vis_itr: 100
  val_itr: 1000

  loss:
    coarse_type: "focal" #"liner"
    coarse_weight: 1.0
    fine_type: "l2_with_std"
    fine_weight: 0.81 

    # Config for coarse
    focal_alpha: 0.5
    focal_gamma: 2.0
    pos_weight: 1.0
    neg_weight: 1.0

    # smooth_l1_with_std
    fine_smooth_l1_beta: 1.0
    fine_loss_weight: 1.0
    fine_correct_thr: 1.0
  
  eval_metrics:
    point_cloud_rescale: 1000
    pnp_reprojection_error: 5
    model_unit: 'm'
    eval_ADD_metric: False
    pose_thresholds: [1, 3, 5]
    use_pycolmap_ransac: False

merge_output_dir: 'dataset/OnePose/merged_anno'

gpus: '0,5'

save_dir: ckpts/${task_name}