exp_name: test_refine
task_name: onepose_test_align

model:
  ckpt: null
  # ckpt: ckpts/onepose_train_align/ckpt_005000.pt

  backbone:
    type: ResNetFPN
    resolution: [8, 2]
    resnetfpn:
      block_type: "BasicBlock"
      initial_dim: 128
      block_dims: [128, 196, 256]
      output_layers: [3, 1]
    pretrained: "weight/LoFTR_wsize9.ckpt"
    pretrained_fix: False

  render_feat_dim: 384
  patch_size: 8
  d_model: 256
  nhead: 8
  d_ffn: 1024
  dropout: 0.0
  num_rot_layers: 4
  num_trans_layers: 4

  positional_encoding:
    enable: True
    pos_emb_shape: [256, 256]

dataset:
  data_root: dataset_local/OnePose
  test_anno_file: ${merge_output_dir}/${task_name}/test.json
  img_resize: [512, 512]
  sigma_rot: 0.1
  sigma_trans: 0.05

merge_output_dir: 'output/merged_anno'

gpus: '0'
