# Joint test config: Match (initial pose) → Refine (pose refinement)
#
# Usage:
#   python test.py --testing_type joint --config config/experiment/test_joint.yaml

# ---- Match stage config (same structure as test_matching.yaml) ----
match:
  model:
    ckpt: null
    # ckpt: ckpts/onepose_train_match/ckpt_090000.pt

    profiler: null

    backbone:
      type: ResNetFPN
      resolution: [8, 2]
      resnetfpn:
        block_type: "BasicBlock"
        initial_dim: 128
        block_dims: [128, 196, 256]
        output_layers: [3, 1]
      pretrained: "weight/LoFTR_wsize9.ckpt"
      pretrained_fix: False

    keypoints_encoding:
      enable: True
      type: mlp_linear
      descriptor_dim: 256
      keypoints_encoder: [32, 64, 128]
      norm_method: "instancenorm"

    positional_encoding:
      enable: True
      pos_emb_shape: [256, 256]

    coarse_matching:
      type: "dual-softmax"
      thr: 0.1
      feat_norm_method: "sqrt_feat_dim"
      border_rm: 2

      dual_softmax:
        temperature: 0.08

      sigmoid:
        temperature: 0.08

      train:
        train_padding: True
        train_coarse_percent: 0.3
        train_pad_num_gt_min: 200

    loftr_coarse:
      type: "LoFTR"
      d_model: 256
      d_ffm: 128
      nhead: 8
      layer_names: ["self", "cross"]
      layer_iter_n: 3
      dropout: 0.
      attention: "linear"
      norm_method: "layernorm"

      kernel_fn: "elu + 1"
      d_kernel: 16
      redraw_interval: 2
      rezero: null
      final_proj: False

    loftr_fine:
      enable: True
      window_size: 5
      coarse_layer_norm: False

      type: "LoFTR"
      d_model: 128
      nhead: 8
      layer_names: ["self", "cross"]
      layer_iter_n: 1
      dropout: 0.0
      attention: "linear"
      norm_method: layernorm

      kernel_fn: "elu + 1"
      d_kernel: 16
      redraw_interval: 2
      rezero: null
      final_proj: False

    fine_matching:
      enable: True
      type: 's2d'

      s2d:
        type: 'heatmap'

    match_type: "softmax"

  dataset:
    data_root: dataset_local/OnePose
    anno_dirs: outputs_${match.model.match_type}/anno
    test_anno_file: ${merge_output_dir}/${match_task_name}/test.json
    augmentor_method: null

    load_3d_coarse: True
    shape3d_train: 7000
    shape3d_val: 7000
    train_image_warp_adapt: True

    img_pad: False
    img_resize: [512, 512]
    df: 8
    coarse_scale: 0.125

    match_type: ${match.model.match_type}

  train:
    eval_metrics:
      point_cloud_rescale: 1000
      pnp_reprojection_error: 5
      model_unit: 'm'
      eval_ADD_metric: False
      pose_thresholds: [1, 3, 5]
      use_pycolmap_ransac: False

# ---- Refine stage config (same structure as test_refining.yaml) ----
refine:
  model:
    ckpt: null
    # ckpt: ckpts/onepose_train_align/ckpt_005000.pt

    backbone:
      type: ResNetFPN
      resolution: [8, 2]
      resnetfpn:
        block_type: "BasicBlock"
        initial_dim: 128
        block_dims: [128, 196, 256]
        output_layers: [3, 1]
      pretrained: "weight/LoFTR_wsize9.ckpt"
      pretrained_fix: False

    render_feat_dim: 384
    patch_size: 8
    d_model: 256
    nhead: 8
    d_ffn: 1024
    dropout: 0.0
    num_rot_layers: 4
    num_trans_layers: 4

    positional_encoding:
      enable: True
      pos_emb_shape: [256, 256]

  dataset:
    img_resize: [512, 512]

# ---- Global settings ----
gs_base_dir: dataset_local/OnePose_gs
match_task_name: onepose_test_match
merge_output_dir: 'output/merged_anno'

gpus: '0'
