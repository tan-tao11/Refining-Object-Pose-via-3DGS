exp_name: train_refine
task_name: onepose_train_refine

model:
  backbone:
    type: ResNetFPN
    resolution: [8, 2]
    resnetfpn:
      block_type: "BasicBlock"
      initial_dim: 128
      block_dims: [128, 196, 256]
      output_layers: [3, 1]
    pretrained: "weight/LoFTR_wsize9.ckpt"
    pretrained_fix: False

  positional_encoding:
    enable: True
    pos_emb_shape: [256, 256]
  
  transformer:
    enable: True
    # Fine preprocess:
    window_size: 5
    coarse_layer_norm: False

    # Fine module
    type: "LoFTR"
    d_model: 128
    nhead: 8
    layer_names: ["self", "cross"]
    layer_iter_n: 1
    dropout: 0.0
    attention: "linear"
    norm_method: layernorm

    kernel_fn: "elu + 1"
    d_kernel: 16
    redraw_interval: 2
    rezero: null
    final_proj: False

dataset:
  data_root: dataset_local/OnePose
  train_anno_file: ${merge_output_dir}/${task_name}/train.json
  val_anno_file: ${merge_output_dir}/${task_name}/val.json
  augmentor_method: null

merge_output_dir: 'output/merged_anno'

gpus: '6,7'

save_dir: ckpts/${task_name}